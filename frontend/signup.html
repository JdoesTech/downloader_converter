<!DOCTYPE html>
<html>
    <head>
        <meta charset ="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Get and Mutate</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
            <div class="auth-page-container">
                <div class="signup-container">
                <h2>Sign up for Get and Mutate</h2>
                    <form class="GnM-form">
                        <div class="form-group">
                            <label>First Name</label>                            
                            <input type="text" id="fname" name="fname" required>
                            <span class="icon"><ion-icon name="person-outline"></ion-icon></span>
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>                            
                            <input type="text" id="lname" name="lname" required>
                            <span class="icon"><ion-icon name="person-outline"></ion-icon></span>
                        </div>
                        <div class="form-group">
                            <label>Email</label>                            
                            <input type="email" id="email" name="email" required>
                            <span class="icon"><ion-icon name="mail-outline"></ion-icon></span>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="password" name="password" required>
                            <span class="icon"><ion-icon name="eye-off-outline"></ion-icon></span>
                        </div>
                        <div class="remember-me">
                            <label><input type="checkbox" id="remember" name="remember">Save my details</label>                            
                        </div>                    
                        <button onclick="signup()">Sign Up</button>
                        <p class="message" id="signup-message"></p>
                        <div class="signup-link">
                            <p>Do you have an account? <a href="login.html">Login</a></p>
                    </form>
                </div>
            </div>
        <script src="script.js"></script>
        <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
        <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    </body>
</html>
